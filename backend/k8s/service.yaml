apiVersion: v1
kind: Service
metadata:
  name: algo-server
  namespace: algo
  labels:
    app: algo-server
spec:
  type: ClusterIP
  selector:
    app: algo-server
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
    - name: ws
      port: 8080
      targetPort: 3000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: algo-server-headless
  namespace: algo
  labels:
    app: algo-server
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: algo-server
  ports:
    - name: ws
      port: 3000
      targetPort: 3000
