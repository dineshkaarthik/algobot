apiVersion: v1
kind: ConfigMap
metadata:
  name: algo-config
  namespace: algo
data:
  NODE_ENV: "production"
  PORT: "3000"
  HOST: "0.0.0.0"
  LLM_PRIMARY: "claude"
  RATE_LIMIT_CHAT: "30"
  RATE_LIMIT_AUTH: "5"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Namespace
metadata:
  name: algo
  labels:
    name: algo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: algo-server
  namespace: algo
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: algo-ingress
  namespace: algo
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:ACCOUNT:certificate/CERT_ID"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: "/api/v1/health"
    alb.ingress.kubernetes.io/stickiness.enabled: "true"
    alb.ingress.kubernetes.io/stickiness.lb-cookie.duration-seconds: "3600"
spec:
  rules:
    - host: api.algo.algonit.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: algo-server
                port:
                  number: 80
