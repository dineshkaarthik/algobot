name: Algo
options:
  bundleIdPrefix: com.algonit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    INFOPLIST_KEY_CFBundleDisplayName: Algo
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.business"

targets:
  Algo:
    type: application
    platform: iOS
    sources:
      - path: Algo
        excludes:
          - "**/*.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.algonit.algo
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Algo needs microphone access for voice commands"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Algo uses speech recognition for voice input"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Algo uses Face ID to secure your account"
        INFOPLIST_KEY_NSCameraUsageDescription: "Algo needs camera access to scan documents"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
